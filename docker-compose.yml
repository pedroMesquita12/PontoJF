version: "3.9"

services:
  backend:
    build: ./backend
    container_name: logicontrol_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: logicontrol_frontend
    restart: always
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "5173:80"
